name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' 

      - name: Install dependencies
        run: |
          pip install flake8
          pip install -r services/user/requirements.txt
          pip install -r services/match/requirements.txt

      - name: Run Lint
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  build-images:
    needs: lint-and-test # ensure images are only built if linting passes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build user service image
        run: docker build ./services/user -t user-service:latest

      - name: Build match service image
        run: docker build ./services/match -t match-service:latest